name: Court Booking CI
on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]
permissions:
    contents: read
    checks: write

jobs:
    unit_tests_services:
        name: Unit Tests for Microservices
        timeout-minutes: 5
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v7
        - uses: actions/setup-java@v5
          with:
            distribution: 'temurin'
            java-version: '25'
            cache: 'maven'
        - name: Build
          id: build
          run: mvn -B compile
          working-directory: ./services
        - name: Unit Tests
          run: mvn -B -Dmaven.test.failure.ignore=true test
          working-directory: ./services
        - name: Publish Unit Test Report
          uses: ScalableCapital/action-surefire-report@v2
          if: ${{ !cancelled() && steps.build.outcome == 'success' }}
          with:
            create_check: true
            check_name: Unit Tests for Microservices / Test Results
            fail_on_test_failures: true
            report_paths: services/**/target/surefire-reports/TEST-*.xml
