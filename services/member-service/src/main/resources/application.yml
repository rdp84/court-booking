spring:
    application:
        name: member-service
    datasource:
        url: ${DB_URL:jdbc:postgresql://localhost:5432/member_service}
        username: ${DB_USERNAME:}
        password: ${DB_PASSWORD:}
    jpa:
        hibernate:
            ddl-auto: validate
        open-in-view: false
    flyway:
        enabled: true
server:
    port: 8082
